<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Thais — translate to AI</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0a0a0a;
    --surface: #111111;
    --surface2: #1a1a1a;
    --border: #2a2a2a;
    --accent: #e8ff47;
    --accent2: #ff6b35;
    --text: #f0f0f0;
    --muted: #888;
    --font-display: 'Syne', sans-serif;
    --font-mono: 'IBM Plex Mono', monospace;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-display);
    min-height: 100vh;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(232,255,71,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(232,255,71,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  .container { max-width: 860px; margin: 0 auto; padding: 0 24px; position: relative; z-index: 1; }

  header { padding: 48px 0 40px; border-bottom: 1px solid var(--border); }

  .logo { display: flex; align-items: baseline; gap: 12px; margin-bottom: 12px; }
  .logo-text { font-size: 13px; font-family: var(--font-mono); color: var(--accent); letter-spacing: 0.15em; text-transform: uppercase; }

  h1 { font-size: clamp(36px, 6vw, 64px); font-weight: 800; line-height: 1; letter-spacing: -0.03em; }
  h1 span { color: var(--accent); }

  .tagline { margin-top: 14px; font-size: 15px; color: var(--muted); font-family: var(--font-mono); letter-spacing: 0.02em; }

  .input-section { padding: 40px 0 32px; }
  .section-label { font-size: 11px; font-family: var(--font-mono); letter-spacing: 0.15em; text-transform: uppercase; color: var(--muted); margin-bottom: 12px; }

  textarea {
    width: 100%; background: var(--surface); border: 1px solid var(--border); color: var(--text);
    font-family: var(--font-mono); font-size: 14px; line-height: 1.6; padding: 20px; resize: vertical; min-height: 140px; outline: none;
  }
  textarea:focus { border-color: var(--accent); }

  .convert-btn {
    margin-top: 16px; background: var(--accent); color: #000; border: none; font-family: var(--font-display); font-weight: 700;
    font-size: 14px; letter-spacing: 0.08em; text-transform: uppercase; padding: 14px 32px; cursor: pointer;
  }

  .spinner { width: 16px; height: 16px; border: 2px solid #000; border-top-color: transparent; border-radius: 50%; animation: spin 0.6s linear infinite; display: none; }
  .spinner.active { display: block; }
  @keyframes spin { to { transform: rotate(360deg); } }

  .output-section { padding-bottom: 60px; display: none; }
  .output-section.visible { display: block; }

  .output-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 24px; padding-bottom: 16px; border-bottom: 1px solid var(--border); }
  .output-title { font-size: 18px; font-weight: 700; letter-spacing: -0.02em; }

  .copy-all-btn { font-family: var(--font-mono); font-size: 12px; background: transparent; border: 1px solid var(--border); color: var(--muted); padding: 8px 16px; cursor: pointer; }

  .prompt-blocks { display: flex; flex-direction: column; gap: 12px; margin-bottom: 28px; }

  .prompt-block { background: var(--surface); border: 1px solid var(--border); display: grid; grid-template-columns: 56px 1fr auto; align-items: start; gap: 0; }

  .block-letter { font-size: 28px; font-weight: 800; color: var(--accent); padding: 18px 0 18px 18px; }
  .block-content { padding: 14px 16px; border-left: 1px solid var(--border); }
  .block-name { font-size: 10px; font-family: var(--font-mono); letter-spacing: 0.15em; text-transform: uppercase; color: var(--muted); margin-bottom: 6px; }
  .block-text { font-size: 14px; line-height: 1.6; color: var(--text); font-family: var(--font-mono); white-space: pre-wrap; }

  .final-prompt { background: var(--surface2); border: 1px solid var(--accent); padding: 24px; }
  .final-prompt-label { font-size: 11px; font-family: var(--font-mono); letter-spacing: 0.15em; text-transform: uppercase; color: var(--accent); margin-bottom: 14px; }
  .final-prompt-text { font-family: var(--font-mono); font-size: 13px; line-height: 1.7; color: var(--text); white-space: pre-wrap; }

  .toast { position: fixed; bottom: 32px; right: 32px; background: var(--accent); color: #000; font-family: var(--font-mono); font-size: 13px; padding: 12px 20px; opacity: 0; transform: translateY(8px); transition: all 0.25s; pointer-events: none; }
  .toast.show { opacity: 1; transform: translateY(0); }

  .error-msg { background: #1a0a0a; border: 1px solid #ff4444; color: #ff8888; font-family: var(--font-mono); font-size: 13px; padding: 16px 20px; margin-top: 16px; display: none; }
  .error-msg.visible { display: block; }

  .divider { border: none; border-top: 1px solid var(--border); margin: 8px 0 28px; }
</style>
</head>
<body>

<div class="container">
  <header>
    <div class="logo">
      <span class="logo-text">v1.0 — AI Prompt Optimizer</span>
    </div>
    <h1>TH<span style="color:var(--accent)">AI</span>S</h1>
    <p class="tagline">input a prompt, question or statement</p>

    <div style="display:flex;gap:10px;margin-top:16px;align-items:center;">
      <a href="/signin" style="padding:8px 18px;border:1px solid #2a2a2a;border-radius:6px;color:#999;font-family:'IBM Plex Mono',monospace;font-size:12px;text-decoration:none;">sign in</a>
      <script async src="https://js.stripe.com/v3/buy-button.js"></script>
      <stripe-buy-button
        buy-button-id="buy_btn_1Tc0JlGY4uogKpGBXQZkuWY5"
        publishable-key="pk_live_51Tb9ckGY4uogKpGBEI5N848ggCSXMz31dPCEztr7aLi5nf3SBvBQmCkSC6pwGKj2kK5u0ydUfgGURPFUuVDT2Hjo00nuXwDmWI"
      ></stripe-buy-button>
    </div>
  </header>

  <section class="input-section">
    <div class="section-label">Input:</div>
    <textarea id="rawPrompt" placeholder="Type or copy/paste your existing prompt here — no matter how rough or vague."></textarea>
    <div class="error-msg" id="errorMsg"></div>
    <button class="convert-btn" id="convertBtn" onclick="convertPrompt()">
      <span class="spinner" id="spinner"></span>
      <span id="btnText">Forge It →</span>
    </button>
  </section>

  <hr class="divider">

  <section class="output-section" id="outputSection">
    <div class="output-header">
      <div class="output-title">Forged Prompt</div>
      <button class="copy-all-btn" onclick="copyAll()">Copy All</button>
    </div>

    <div class="prompt-blocks" id="promptBlocks"></div>

    <div class="final-prompt">
      <div class="final-prompt-label">// Ready-to-use assembled prompt</div>
      <div class="final-prompt-text" id="finalPromptText"></div>
      <button class="copy-final-btn" onclick="copyFinal()">Copy Prompt →</button>
    </div>
  </section>
</div>

<div class="toast" id="toast">Copied to clipboard</div>

<script>
let parsedBlocks = {};
let assembledPrompt = '';
let blockValues = [];

async function convertPrompt() {
  const raw = document.getElementById('rawPrompt').value.trim();
  if (!raw) return;

  const btn = document.getElementById('convertBtn');
  const spinner = document.getElementById('spinner');
  const btnText = document.getElementById('btnText');
  const errorMsg = document.getElementById('errorMsg');

  btn.disabled = true;
  spinner.classList.add('active');
  btnText.textContent = 'Forging...';
  errorMsg.classList.remove('visible');
  document.getElementById('outputSection').classList.remove('visible');

  // Basic session context for memory system (expand this as the app grows into full sessions)
  // Get Supabase session for user identity
const { createClient } = supabase;
const sb = createClient(
  'https://czubtmjnjhikvfotcdug.supabase.co',
  'sb_publishable_NTMVggZSl6xG4SS3Q0yr5Q_Sx8NVHEW'
);
const { data: { session } } = await sb.auth.getSession();
const userId = session?.user?.id || 'anonymous';

const sessionContext = {
  userId,
  turnCount: 1,
  conversationSummary: [raw],
  currentProject: null,
  currentTask: null
};

  try {
    const response = await fetch("/api/forge", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ prompt: raw, sessionContext })
    });

    const data = await response.json();
    if (!response.ok) throw new Error(data.error || 'Request failed');

    const rawText = data.content[0].text;
    const clean = rawText.replace(/```json|```/g, '').trim();
    const parsed = JSON.parse(clean);

    parsedBlocks = parsed;
    assembledPrompt = parsed.assembled;
    renderOutput(parsed);

    // Future: if (data.memoryOffer) { show memory offer UI }
  } catch (err) {
    errorMsg.textContent = 'Something went wrong. Please try again.';
    errorMsg.classList.add('visible');
  } finally {
    btn.disabled = false;
    spinner.classList.remove('active');
    btnText.textContent = 'Forge It →';
  }
}

function renderOutput(data) {
  const blocks = [
    { letter: 'P', name: 'Position', value: data.position },
    { letter: 'R', name: 'Relevant Context', value: data.context },
    { letter: 'O', name: 'Objective', value: data.objective },
    { letter: 'M', name: 'Manner', value: data.manner },
    { letter: 'P', name: 'Purpose / Audience', value: data.audience },
    { letter: 'T', name: 'Target Format', value: data.format },
    { letter: 'F', name: 'Forge', value: data.forge },
  ];

  const container = document.getElementById('promptBlocks');
  container.innerHTML = '';
  blockValues = blocks.map(b => b.value);

  blocks.forEach((block, i) => {
    const el = document.createElement('div');
    el.className = 'prompt-block';
    el.innerHTML = `
      <div class="block-letter">${block.letter}</div>
      <div class="block-content">
        <div class="block-name">${block.name}</div>
        <div class="block-text">${escapeHtml(block.value)}</div>
      </div>
      <button class="block-copy" onclick="copyBlockByIndex(${i})">⎘</button>
    `;
    container.appendChild(el);
  });

  document.getElementById('finalPromptText').textContent = data.assembled;
  document.getElementById('outputSection').classList.add('visible');
  document.getElementById('outputSection').scrollIntoView({ behavior: 'smooth', block: 'start' });
}

function escapeHtml(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function copyToClipboard(text, msg = 'Copied to clipboard') {
  if (navigator.clipboard && window.isSecureContext) {
    navigator.clipboard.writeText(text).then(() => showToast(msg));
  } else {
    const ta = document.createElement('textarea');
    ta.value = text;
    ta.style.position = 'fixed';
    ta.style.opacity = '0';
    document.body.appendChild(ta);
    ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
    showToast(msg);
  }
}

function copyBlockByIndex(i) { copyToClipboard(blockValues[i]); }

function copyFinal() { copyToClipboard(assembledPrompt, 'Final prompt copied'); }

function copyAll() {
  const parts = Object.entries(parsedBlocks)
    .filter(e => e[0] !== 'assembled')
    .map(e => `[${e[0].toUpperCase()}]\n${e[1]}`);
  const allText = parts.join('\n\n') + '\n\n[ASSEMBLED PROMPT]\n' + assembledPrompt;
  copyToClipboard(allText, 'All sections copied');
}

function showToast(msg) {
  const toast = document.getElementById('toast');
  toast.textContent = msg;
  toast.classList.add('show');
  setTimeout(() => toast.classList.remove('show'), 2000);
}
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Thais — translate to AI</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0a0a0a;
    --surface: #111111;
    --surface2: #1a1a1a;
    --border: #2a2a2a;
    --accent: #e8ff47;
    --accent2: #ff6b35;
    --text: #f0f0f0;
    --muted: #888;
    --font-display: 'Syne', sans-serif;
    --font-mono: 'IBM Plex Mono', monospace;
  }

  body { background: var(--bg); color: var(--text); font-family: var(--font-display); min-height: 100vh; overflow-x: hidden; }

  body::before {
    content: ''; position: fixed; inset: 0;
    background-image: linear-gradient(rgba(232,255,71,0.03) 1px, transparent 1px), linear-gradient(90deg, rgba(232,255,71,0.03) 1px, transparent 1px);
    background-size: 40px 40px; pointer-events: none; z-index: 0;
  }

  .container { max-width: 860px; margin: 0 auto; padding: 0 24px; position: relative; z-index: 1; }

  header { padding: 32px 0 28px; border-bottom: 1px solid var(--border); }

  .logo { display: flex; align-items: baseline; gap: 12px; margin-bottom: 12px; }
  .logo-text { font-size: 13px; font-family: var(--font-mono); color: var(--accent); letter-spacing: 0.15em; text-transform: uppercase; }

  h1 { font-size: clamp(36px, 6vw, 64px); font-weight: 800; line-height: 1; letter-spacing: -0.03em; }
  h1 span { color: var(--accent); }

  .tagline { margin-top: 14px; font-size: 15px; color: var(--muted); font-family: var(--font-mono); letter-spacing: 0.02em; }

  .auth-bar { display: flex; gap: 10px; margin-top: 16px; align-items: center; min-height: 40px; }
  .auth-logged-out { display: none; gap: 10px; align-items: center; }
  .auth-logged-in  { display: none; gap: 10px; align-items: center; }
  .auth-logged-out.visible { display: flex; }
  .auth-logged-in.visible  { display: flex; }

  .btn-signin { padding: 8px 18px; border: 1px solid #2a2a2a; border-radius: 6px; color: #999; font-family: var(--font-mono); font-size: 12px; text-decoration: none; background: transparent; cursor: pointer; transition: border-color .15s, color .15s; }
  .btn-signin:hover { border-color: #444; color: var(--text); }

  .account-wrap { position: relative; }
  .account-btn { display: flex; align-items: center; gap: 8px; padding: 7px 14px; background: var(--surface); border: 1px solid var(--border); border-radius: 6px; color: var(--text); font-family: var(--font-mono); font-size: 12px; cursor: pointer; transition: border-color .15s; }
  .account-btn:hover { border-color: #444; }
  .account-avatar { width: 22px; height: 22px; border-radius: 50%; background: var(--accent); color: #000; font-size: 11px; font-weight: 700; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .account-email { max-width: 140px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; color: var(--muted); }

  .account-dropdown { display: none; position: absolute; top: calc(100% + 6px); left: 0; min-width: 180px; background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; overflow: hidden; z-index: 50; box-shadow: 0 8px 24px rgba(0,0,0,.4); }
  .account-dropdown.open { display: block; }
  .account-dropdown a, .account-dropdown button { display: block; width: 100%; padding: 11px 16px; text-align: left; font-family: var(--font-mono); font-size: 12px; color: var(--muted); background: transparent; border: none; cursor: pointer; text-decoration: none; transition: background .1s, color .1s; letter-spacing: .04em; }
  .account-dropdown a:hover, .account-dropdown button:hover { background: var(--surface); color: var(--text); }
  .dropdown-divider { border: none; border-top: 1px solid var(--border); margin: 4px 0; }
  .btn-signout { color: #ff6b6b !important; }
  .btn-signout:hover { background: rgba(255,107,107,.08) !important; }

  .mode-toggle { display: flex; gap: 6px; margin: 20px 0 0; background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 4px; width: fit-content; }
  .mode-btn { padding: 8px 18px; border: none; border-radius: 6px; background: transparent; color: var(--muted); font-family: var(--font-mono); font-size: 12px; letter-spacing: .06em; text-transform: uppercase; cursor: pointer; transition: all .15s; display: flex; align-items: center; gap: 6px; }
  .mode-btn.active { background: var(--accent); color: #0a0a0a; font-weight: 500; }
  .mode-btn:not(.active):hover { color: var(--text); }

  .input-section { padding: 40px 0 32px; }
  .section-label { font-size: 11px; font-family: var(--font-mono); letter-spacing: 0.15em; text-transform: uppercase; color: var(--muted); margin-bottom: 12px; }

  textarea { width: 100%; background: var(--surface); border: 1px solid var(--border); color: var(--text); font-family: var(--font-mono); font-size: 14px; line-height: 1.6; padding: 20px; resize: vertical; min-height: 140px; outline: none; }
  textarea:focus { border-color: var(--accent); }

  .convert-btn { margin-top: 16px; background: var(--accent); color: #000; border: none; font-family: var(--font-display); font-weight: 700; font-size: 14px; letter-spacing: 0.08em; text-transform: uppercase; padding: 14px 32px; cursor: pointer; display: inline-flex; align-items: center; gap: 10px; }

  .spinner { width: 16px; height: 16px; border: 2px solid #000; border-top-color: transparent; border-radius: 50%; animation: spin 0.6s linear infinite; display: none; }
  .spinner.active { display: block; }
  @keyframes spin { to { transform: rotate(360deg); } }

  .output-section { padding-bottom: 60px; display: none; }
  .output-section.visible { display: block; }
  .output-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 24px; padding-bottom: 16px; border-bottom: 1px solid var(--border); }
  .output-title { font-size: 18px; font-weight: 700; letter-spacing: -0.02em; }
  .copy-all-btn { font-family: var(--font-mono); font-size: 12px; background: transparent; border: 1px solid var(--border); color: var(--muted); padding: 8px 16px; cursor: pointer; }
  .prompt-blocks { display: flex; flex-direction: column; gap: 12px; margin-bottom: 28px; }
  .prompt-block { background: var(--surface); border: 1px solid var(--border); display: grid; grid-template-columns: 56px 1fr auto; align-items: start; gap: 0; }
  .block-letter { font-size: 28px; font-weight: 800; color: var(--accent); padding: 18px 0 18px 18px; }
  .block-content { padding: 14px 16px; border-left: 1px solid var(--border); }
  .block-name { font-size: 10px; font-family: var(--font-mono); letter-spacing: 0.15em; text-transform: uppercase; color: var(--muted); margin-bottom: 6px; }
  .block-text { font-size: 14px; line-height: 1.6; color: var(--text); font-family: var(--font-mono); white-space: pre-wrap; }
  .final-prompt { background: var(--surface2); border: 1px solid var(--accent); padding: 24px; }
  .final-prompt-label { font-size: 11px; font-family: var(--font-mono); letter-spacing: 0.15em; text-transform: uppercase; color: var(--accent); margin-bottom: 14px; }
  .final-prompt-text { font-family: var(--font-mono); font-size: 13px; line-height: 1.7; color: var(--text); white-space: pre-wrap; }

  .chat-section { display: none; flex-direction: column; height: calc(100vh - 300px); min-height: 400px; padding-top: 20px; }
  .chat-section.visible { display: flex; }

  .chat-toolbar { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }

  .workflow-badge { display: none; align-items: center; gap: 6px; padding: 6px 12px; background: rgba(232,255,71,.08); border: 1px solid rgba(232,255,71,.2); border-radius: 100px; font-size: 11px; color: var(--accent); letter-spacing: .06em; width: fit-content; cursor: pointer; }
  .workflow-badge.visible { display: flex; }
  .workflow-badge:hover { background: rgba(232,255,71,.14); }

  .new-chat-btn { display: flex; align-items: center; gap: 6px; padding: 6px 12px; background: transparent; border: 1px solid var(--border); border-radius: 100px; font-family: var(--font-mono); font-size: 11px; color: var(--muted); cursor: pointer; letter-spacing: .04em; transition: border-color .15s, color .15s; }
  .new-chat-btn:hover { border-color: #444; color: var(--text); }

  .workflow-confirm { display: none; padding: 16px 20px; background: var(--surface); border: 1px solid rgba(232,255,71,.25); border-radius: 10px; margin-bottom: 16px; }
  .workflow-confirm.visible { display: block; }
  .workflow-confirm-text { font-size: 13px; color: var(--text); margin-bottom: 12px; line-height: 1.6; }
  .workflow-confirm-actions { display: flex; gap: 8px; }
  .wf-yes, .wf-no { padding: 7px 16px; border-radius: 6px; font-family: var(--font-mono); font-size: 11px; letter-spacing: .06em; cursor: pointer; border: none; transition: opacity .15s; }
  .wf-yes { background: var(--accent); color: #0a0a0a; font-weight: 500; }
  .wf-no  { background: transparent; border: 1px solid var(--border); color: var(--muted); }
  .wf-yes:hover, .wf-no:hover { opacity: .8; }

  .chat-messages { flex: 1; overflow-y: auto; padding: 8px 0; display: flex; flex-direction: column; gap: 16px; scrollbar-width: thin; scrollbar-color: var(--border) transparent; }
  .chat-messages::-webkit-scrollbar { width: 4px; }
  .chat-messages::-webkit-scrollbar-track { background: transparent; }
  .chat-messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .chat-message { display: flex; flex-direction: column; gap: 4px; animation: fadeUp .2s ease; max-width: 88%; }
  @keyframes fadeUp { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
  .chat-message.user      { align-self: flex-end;  align-items: flex-end; }
  .chat-message.assistant { align-self: flex-start; align-items: flex-start; }

  .message-bubble { padding: 12px 16px; border-radius: 12px; font-size: 14px; line-height: 1.65; white-space: pre-wrap; word-break: break-word; }
  .user .message-bubble      { background: var(--accent); color: #0a0a0a; border-bottom-right-radius: 4px; }
  .assistant .message-bubble { background: var(--surface); border: 1px solid var(--border); color: var(--text); border-bottom-left-radius: 4px; }
  .message-meta { font-size: 10px; color: var(--muted); letter-spacing: .04em; padding: 0 4px; }

  /* Image preview in message bubble */
  .message-image { max-width: 100%; border-radius: 8px; margin-bottom: 8px; display: block; }

  /* Image preview before sending */
  .image-preview-wrap {
    display: none;
    align-items: center;
    gap: 8px;
    padding: 8px 12px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    margin-bottom: 8px;
  }
  .image-preview-wrap.visible { display: flex; }
  .image-preview-thumb { width: 48px; height: 48px; object-fit: cover; border-radius: 6px; }
  .image-preview-name { font-family: var(--font-mono); font-size: 11px; color: var(--muted); flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .image-preview-remove { background: transparent; border: none; color: var(--muted); cursor: pointer; font-size: 16px; padding: 0 4px; line-height: 1; }
  .image-preview-remove:hover { color: #ff6b6b; }

  .typing-indicator { display: none; align-self: flex-start; padding: 12px 16px; background: var(--surface); border: 1px solid var(--border); border-radius: 12px; border-bottom-left-radius: 4px; gap: 4px; align-items: center; }
  .typing-indicator.visible { display: flex; }
  .typing-dot { width: 6px; height: 6px; background: var(--muted); border-radius: 50%; animation: typingBounce 1.2s infinite; }
  .typing-dot:nth-child(2) { animation-delay: .2s; }
  .typing-dot:nth-child(3) { animation-delay: .4s; }
  @keyframes typingBounce { 0%, 60%, 100% { transform: translateY(0); opacity: .4; } 30% { transform: translateY(-4px); opacity: 1; } }

  .chat-input-wrap { display: flex; gap: 8px; align-items: flex-end; padding-top: 16px; border-top: 1px solid var(--border); margin-top: 8px; }

  .chat-input { flex: 1; background: var(--surface); border: 1px solid var(--border); border-radius: 10px; color: var(--text); font-family: var(--font-mono); font-size: 14px; line-height: 1.5; padding: 11px 14px; resize: none; outline: none; min-height: 44px; max-height: 160px; transition: border-color .15s; overflow-y: auto; }
  .chat-input:focus { border-color: var(--accent); }
  .chat-input::placeholder { color: var(--muted); }

  /* Camera / image upload button */
  .camera-btn { width: 44px; height: 44px; background: var(--surface); border: 1px solid var(--border); border-radius: 10px; color: var(--muted); cursor: pointer; display: grid; place-items: center; flex-shrink: 0; transition: border-color .15s, color .15s; }
  .camera-btn:hover { border-color: var(--accent); color: var(--accent); }
  .camera-btn.has-image { border-color: var(--accent); color: var(--accent); }

  .newline-btn { width: 44px; height: 44px; background: var(--surface); border: 1px solid var(--border); border-radius: 10px; color: var(--muted); cursor: pointer; display: grid; place-items: center; flex-shrink: 0; font-size: 18px; transition: border-color .15s, color .15s; }
  .newline-btn:hover { border-color: #444; color: var(--text); }

  .chat-send-btn { width: 44px; height: 44px; background: var(--accent); border: none; border-radius: 10px; color: #0a0a0a; cursor: pointer; display: grid; place-items: center; flex-shrink: 0; transition: opacity .15s, transform .12s; }
  .chat-send-btn:hover:not(:disabled) { opacity: .88; transform: translateY(-1px); }
  .chat-send-btn:disabled { opacity: .4; cursor: not-allowed; }

  .chat-hint { font-size: 10px; color: var(--muted); text-align: center; margin-top: 8px; letter-spacing: .03em; }

  .toast { position: fixed; bottom: 32px; right: 32px; background: var(--accent); color: #000; font-family: var(--font-mono); font-size: 13px; padding: 12px 20px; opacity: 0; transform: translateY(8px); transition: all 0.25s; pointer-events: none; z-index: 100; }
  .toast.show { opacity: 1; transform: translateY(0); }

  .error-msg { background: #1a0a0a; border: 1px solid #ff4444; color: #ff8888; font-family: var(--font-mono); font-size: 13px; padding: 16px 20px; margin-top: 16px; display: none; }
  .error-msg.visible { display: block; }
</style>
</head>
<body>

<div class="container">
  <header>
    <div class="logo">
      <span class="logo-text">v1.0 — AI Prompt Optimizer</span>
    </div>
    <h1>TH<span style="color:var(--accent)">AI</span>S</h1>
    <p class="tagline">input a prompt, question or statement</p>

    <div class="auth-bar">
      <div class="auth-logged-out" id="authLoggedOut">
        <a href="/signin" class="btn-signin">sign in</a>
        <script async src="https://js.stripe.com/v3/buy-button.js"></script>
        <stripe-buy-button
          buy-button-id="buy_btn_1TeN9ZGY4uogKpGBcfcHs1Gw"
          publishable-key="pk_live_51Tb9ckGY4uogKpGBEI5N848ggCSXMz31dPCEztr7aLi5nf3SBvBQmCkSC6pwGKj2kK5u0ydUfgGURPFUuVDT2Hjo00nuXwDmWI"
        ></stripe-buy-button>
      </div>
      <div class="auth-logged-in" id="authLoggedIn">
        <div class="account-wrap">
          <button class="account-btn" id="accountBtn" onclick="toggleAccountMenu()">
            <div class="account-avatar" id="accountAvatar">?</div>
            <span class="account-email" id="accountEmail">loading...</span>
            <span style="color:var(--muted);font-size:10px;">▾</span>
          </button>
          <div class="account-dropdown" id="accountDropdown">
            <a href="/account">account settings</a>
            <hr class="dropdown-divider">
            <button class="btn-signout" onclick="handleSignOut()">sign out</button>
          </div>
        </div>
      </div>
    </div>

    <div class="mode-toggle">
      <button class="mode-btn active" id="forgeBtn" onclick="setMode('forge')">⚡ Forge</button>
      <button class="mode-btn" id="chatBtn" onclick="setMode('chat')">💬 Chat</button>
    </div>
  </header>

  <section class="input-section" id="forgeSection">
    <div class="section-label">Input:</div>
    <textarea id="rawPrompt" placeholder="Type or copy/paste your existing prompt here — no matter how rough or vague."></textarea>
    <div class="error-msg" id="errorMsg"></div>
    <button class="convert-btn" id="convertBtn" onclick="convertPrompt()">
      <span class="spinner" id="spinner"></span>
      <span id="btnText">Forge It →</span>
    </button>
  </section>

  <div class="chat-section" id="chatSection">
    <div class="chat-toolbar">
      <div class="workflow-badge" id="workflowBadge" onclick="resetChat()">
        <span id="workflowIcon"></span>
        <span id="workflowLabel"></span>
        <span style="opacity:.5;font-size:10px;">× change</span>
      </div>
      <button class="new-chat-btn" onclick="resetChat()">＋ new chat</button>
    </div>

    <div class="workflow-confirm" id="workflowConfirm">
      <p class="workflow-confirm-text" id="workflowConfirmText"></p>
      <div class="workflow-confirm-actions">
        <button class="wf-yes" onclick="confirmWorkflow()">Yes, that's right</button>
        <button class="wf-no" onclick="declineWorkflow()">Not quite</button>
      </div>
    </div>

    <div class="chat-messages" id="chatMessages">
      <div class="chat-message assistant">
        <div class="message-bubble">What are you working on?</div>
        <span class="message-meta">Thais</span>
      </div>
    </div>

    <div class="typing-indicator" id="typingIndicator">
      <div class="typing-dot"></div>
      <div class="typing-dot"></div>
      <div class="typing-dot"></div>
    </div>

    <!-- Image preview strip -->
    <div class="image-preview-wrap" id="imagePreviewWrap">
      <img class="image-preview-thumb" id="imagePreviewThumb" src="" alt="preview">
      <span class="image-preview-name" id="imagePreviewName"></span>
      <button class="image-preview-remove" onclick="clearImage()">×</button>
    </div>

    <div class="chat-input-wrap">
      <!-- Hidden file input -->
      <input type="file" id="imageFileInput" accept="image/*" style="display:none" onchange="handleImageSelect(event)">
      <textarea class="chat-input" id="chatInput" placeholder="Say what's on your mind..." rows="1" onkeydown="handleChatKey(event)" oninput="autoResizeChatInput(this)"></textarea>
      <button class="camera-btn" id="cameraBtn" onclick="document.getElementById('imageFileInput').click()" title="Attach image">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/>
          <circle cx="12" cy="13" r="4"/>
        </svg>
      </button>
      <button class="newline-btn" onclick="insertNewLine()" title="New line">↵</button>
      <button class="chat-send-btn" id="chatSendBtn" onclick="sendChatMessage()">
        <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
          <path d="M2 9h14M9 2l7 7-7 7" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>
    </div>
    <p class="chat-hint">📷 attach image · ↵ new line · arrow to send</p>
  </div>

  <hr style="border:none;border-top:1px solid var(--border);margin:8px 0 28px;">

  <section class="output-section" id="outputSection">
    <div class="output-header">
      <div class="output-title">Forged Prompt</div>
      <button class="copy-all-btn" onclick="copyAll()">Copy All</button>
    </div>
    <div class="prompt-blocks" id="promptBlocks"></div>
    <div class="final-prompt">
      <div class="final-prompt-label">// Ready-to-use assembled prompt</div>
  <div class="final-prompt-text" id="finalPromptText"></div>
      <button class="copy-final-btn" onclick="copyFinal()">Copy Prompt →</button>
    </div>
  </section>
</div>

<div class="toast" id="toast">Copied to clipboard</div>

<script>
let parsedBlocks = {};
let assembledPrompt = '';
let blockValues = [];
let chatHistory = [];
let activeWorkflow = null;
let chatUserId = 'anonymous';
let supabaseClient = null;
let pendingImageBase64 = null;
let pendingImageType = null;

// ── Supabase init ─────────────────────────────────────────────
(async () => {
  try {
    const { createClient } = supabase;
    supabaseClient = createClient(
      'https://czubtmjnjhikvfotcdug.supabase.co',
      'sb_publishable_NTMVggZSl6xG4SS3Q0yr5Q_Sx8NVHEW'
    );
    const { data: { session } } = await supabaseClient.auth.getSession();
    if (session?.user) { 
      setLoggedIn(session.user); 
    } else { 
      setTimeout(() => setLoggedOut(), 500);
    }
    supabaseClient.auth.onAuthStateChange((event, session) => {
      if (session?.user) { setLoggedIn(session.user); } else { setLoggedOut(); }
    });
  } catch(e) { setLoggedOut(); }
})();

function setLoggedIn(user) {
  chatUserId = user.id;
  const email = user.email || '';
  document.getElementById('authLoggedOut').classList.remove('visible');
  document.getElementById('authLoggedIn').classList.add('visible');
  document.getElementById('accountAvatar').textContent = email.charAt(0).toUpperCase();
  document.getElementById('accountEmail').textContent = email;
}

function setLoggedOut() {
  chatUserId = 'anonymous';
  document.getElementById('authLoggedOut').classList.add('visible');
  document.getElementById('authLoggedIn').classList.remove('visible');
}

function toggleAccountMenu() {
  document.getElementById('accountDropdown').classList.toggle('open');
}

document.addEventListener('click', (e) => {
  const btn = document.getElementById('accountBtn');
  const dropdown = document.getElementById('accountDropdown');
  if (btn && !btn.contains(e.target)) dropdown.classList.remove('open');
});

async function handleSignOut() {
  try {
    if (supabaseClient) await supabaseClient.auth.signOut();
    setLoggedOut();
    document.getElementById('accountDropdown').classList.remove('open');
    showToast('Signed out');
  } catch(e) { showToast('Sign out failed'); }
}

// ── Mode switching ────────────────────────────────────────────
function setMode(mode) {
  const forgeSection = document.getElementById('forgeSection');
  const outputSection = document.getElementById('outputSection');
  const chatSection = document.getElementById('chatSection');
  const forgeBtn = document.getElementById('forgeBtn');
  const chatBtn = document.getElementById('chatBtn');
  if (mode === 'forge') {
    forgeSection.style.display = 'block';
    chatSection.classList.remove('visible');
    forgeBtn.classList.add('active');
    chatBtn.classList.remove('active');
    if (parsedBlocks && Object.keys(parsedBlocks).length > 0) outputSection.classList.add('visible');
  } else {
    forgeSection.style.display = 'none';
    outputSection.classList.remove('visible');
    chatSection.classList.add('visible');
    forgeBtn.classList.remove('active');
    chatBtn.classList.add('active');
    setTimeout(() => document.getElementById('chatInput').focus(), 100);
  }
}

// ── Image handling ────────────────────────────────────────────
function handleImageSelect(event) {
  const file = event.target.files[0];
  if (!file) return;

  const reader = new FileReader();
  reader.onload = (e) => {
    const dataUrl = e.target.result;
    pendingImageBase64 = dataUrl.split(',')[1];
    pendingImageType = file.type;

    document.getElementById('imagePreviewThumb').src = dataUrl;
    document.getElementById('imagePreviewName').textContent = file.name;
    document.getElementById('imagePreviewWrap').classList.add('visible');
    document.getElementById('cameraBtn').classList.add('has-image');
  };
  reader.readAsDataURL(file);
  event.target.value = '';
}

function clearImage() {
  pendingImageBase64 = null;
  pendingImageType = null;
  document.getElementById('imagePreviewWrap').classList.remove('visible');
  document.getElementById('imagePreviewThumb').src = '';
  document.getElementById('imagePreviewName').textContent = '';
  document.getElementById('cameraBtn').classList.remove('has-image');
}

// ── Forge ─────────────────────────────────────────────────────
async function convertPrompt() {
  const raw = document.getElementById('rawPrompt').value.trim();
  if (!raw) return;
  const btn = document.getElementById('convertBtn');
  const spinner = document.getElementById('spinner');
  const btnText = document.getElementById('btnText');
  const errorMsg = document.getElementById('errorMsg');
  btn.disabled = true; spinner.classList.add('active'); btnText.textContent = 'Forging...';
  errorMsg.classList.remove('visible');
  document.getElementById('outputSection').classList.remove('visible');
  try {
    const response = await fetch('/api/forge', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ prompt: raw, sessionContext: { userId: chatUserId, turnCount: 1, conversationSummary: [raw], currentProject: null, currentTask: null } })
    });
    const data = await response.json();
    if (!response.ok) throw new Error(data.error || 'Request failed');
    const clean = data.content[0].text.replace(/```json|```/g, '').trim();
    const parsed = JSON.parse(clean);
    parsedBlocks = parsed; assembledPrompt = parsed.assembled; renderOutput(parsed);
  } catch (err) {
    errorMsg.textContent = 'Something went wrong. Please try again.'; errorMsg.classList.add('visible');
  } finally {
    btn.disabled = false; spinner.classList.remove('active'); btnText.textContent = 'Forge It →';
  }
}

function renderOutput(data) {
  const blocks = [
    { letter: 'P', name: 'Position',          value: data.position  },
    { letter: 'R', name: 'Relevant Context',  value: data.context   },
    { letter: 'O', name: 'Objective',          value: data.objective },
    { letter: 'M', name: 'Manner',             value: data.manner    },
    { letter: 'P', name: 'Purpose / Audience', value: data.audience  },
    { letter: 'T', name: 'Target Format',      value: data.format    },
    { letter: 'F', name: 'Forge',              value: data.forge     },
  ];
  const container = document.getElementById('promptBlocks');
  container.innerHTML = '';
  blockValues = blocks.map(b => b.value);
  blocks.forEach((block, i) => {
    const el = document.createElement('div');
    el.className = 'prompt-block';
    el.innerHTML = `<div class="block-letter">${block.letter}</div><div class="block-content"><div class="block-name">${block.name}</div><div class="block-text">${escapeHtml(block.value)}</div></div><button class="block-copy" onclick="copyBlockByIndex(${i})">⎘</button>`;
    container.appendChild(el);
  });
  document.getElementById('finalPromptText').textContent = data.assembled;
  document.getElementById('outputSection').classList.add('visible');
  document.getElementById('outputSection').scrollIntoView({ behavior: 'smooth', block: 'nearest' });
}

// ── Chat ──────────────────────────────────────────────────────
async function sendChatMessage() {
  const input = document.getElementById('chatInput');
  const message = input.value.trim();
  if (!message && !pendingImageBase64) return;

  const displayMessage = message || '📷 Image';
  addMessageToUI('user', displayMessage, pendingImageBase64 ? `data:${pendingImageType};base64,${pendingImageBase64}` : null);
  input.value = '';
  autoResizeChatInput(input);

  const imageToSend = pendingImageBase64;
  const imageTypeToSend = pendingImageType;
  clearImage();

  chatHistory.push({ role: 'user', content: message || 'Please analyze this image.' });
  setChatLoading(true);

  try {
    const body = {
      message: message || 'Please analyze this image.',
      history: chatHistory.slice(0, -1),
      userId: chatUserId,
    };
    if (imageToSend) {
      body.imageBase64 = imageToSend;
      body.imageType = imageTypeToSend;
    }

    const res = await fetch('/api/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body),
    });

    const data = await res.json();
    if (!res.ok) throw new Error(data.error || 'Request failed');

    addMessageToUI('assistant', data.message);
    chatHistory.push({ role: 'assistant', content: data.message });

    if (data.workflow && !activeWorkflow) {
      activeWorkflow = data.workflow;
      updateWorkflowBadge(data.workflow);
    }
  } catch (err) {
    addMessageToUI('assistant', 'Something went wrong. Please try again.');
    chatHistory.pop();
  } finally {
    setChatLoading(false);
  }
}

function resetChat() {
  activeWorkflow = null; chatHistory = [];
  clearImage();
  document.getElementById('workflowBadge').classList.remove('visible');
  document.getElementById('workflowConfirm').classList.remove('visible');
  document.getElementById('chatMessages').innerHTML = `<div class="chat-message assistant"><div class="message-bubble">What are you working on?</div><span class="message-meta">Thais</span></div>`;
}

function confirmWorkflow() { document.getElementById('workflowConfirm').classList.remove('visible'); }
function declineWorkflow() { document.getElementById('workflowConfirm').classList.remove('visible'); }

function updateWorkflowBadge(workflow) {
  document.getElementById('workflowIcon').textContent = workflow.icon || '';
  document.getElementById('workflowLabel').textContent = workflow.label || '';
  document.getElementById('workflowBadge').classList.add('visible');
}

function renderMarkdown(text) {
  return text
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
    .replace(/\*(.+?)\*/g, '<em>$1</em>')
    .replace(/`(.+?)`/g, '<code style="background:#1a1a1a;padding:2px 6px;border-radius:4px;font-size:13px;">$1</code>')
    .replace(/^(\d+)\. (.+)$/gm, '<div style="margin:4px 0;"><span style="color:var(--accent);font-weight:700;">$1.</span> $2</div>')
    .replace(/^- (.+)$/gm, '<div style="margin:4px 0;">• $1</div>')
    .replace(/\n\n/g, '<br><br>').replace(/\n/g, '<br>');
}

function addMessageToUI(role, content, imageDataUrl) {
  const messages = document.getElementById('chatMessages');
  const div = document.createElement('div');
  div.className = 'chat-message ' + role;
  const time = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
  const metaLabel = role === 'user' ? 'You' : 'Thais';
  const rendered = role === 'assistant' ? renderMarkdown(content) : escapeHtml(content);
  const imgHtml = imageDataUrl ? `<img class="message-image" src="${imageDataUrl}" alt="attached image">` : '';
  div.innerHTML = `<div class="message-bubble">${imgHtml}${rendered}</div><span class="message-meta">${metaLabel} · ${time}</span>`;
  messages.appendChild(div);
  messages.scrollTop = messages.scrollHeight;
}

function setChatLoading(loading) {
  document.getElementById('chatSendBtn').disabled = loading;
  document.getElementById('chatInput').disabled = loading;
  document.getElementById('typingIndicator').classList.toggle('visible', loading);
  if (loading) { const m = document.getElementById('chatMessages'); m.scrollTop = m.scrollHeight; }
}

function handleChatKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendChatMessage(); }
}

function insertNewLine() {
  const input = document.getElementById('chatInput');
  const start = input.selectionStart;
  input.value = input.value.slice(0, start) + '\n' + input.value.slice(input.selectionEnd);
  input.selectionStart = input.selectionEnd = start + 1;
  autoResizeChatInput(input);
  input.focus();
}

function autoResizeChatInput(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 160) + 'px';
}

function escapeHtml(str) { return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function copyToClipboard(text, msg) {
  msg = msg || 'Copied to clipboard';
  if (navigator.clipboard && window.isSecureContext) {
    navigator.clipboard.writeText(text).then(() => showToast(msg));
  } else {
    const ta = document.createElement('textarea');
    ta.value = text; ta.style.position = 'fixed'; ta.style.opacity = '0';
    document.body.appendChild(ta); ta.select(); document.execCommand('copy');
    document.body.removeChild(ta); showToast(msg);
  }
}

function copyBlockByIndex(i) { copyToClipboard(blockValues[i]); }
function copyFinal() { copyToClipboard(assembledPrompt, 'Final prompt copied'); }

function copyAll() {
  const parts = Object.entries(parsedBlocks).filter(e => e[0] !== 'assembled').map(e => '[' + e[0].toUpperCase() + ']\n' + e[1]);
  copyToClipboard(parts.join('\n\n') + '\n\n[ASSEMBLED PROMPT]\n' + assembledPrompt, 'All sections copied');
}

function showToast(msg) {
  const toast = document.getElementById('toast');
  toast.textContent = msg; toast.classList.add('show');
  setTimeout(() => toast.classList.remove('show'), 2000);
}
</script>

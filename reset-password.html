<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reset Password — Thais</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=IBM+Plex+Mono:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #0a0a0a;
      --surface:  #111111;
      --border:   #2a2a2a;
      --text:     #f0f0f0;
      --muted:    #888;
      --accent:   #e8ff47;
      --error:    #ff4444;
      --success:  #44ff88;
      --font-display: 'Syne', sans-serif;
      --font-mono:    'IBM Plex Mono', monospace;
      --radius:   8px;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-mono);
      font-size: 14px;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      -webkit-font-smoothing: antialiased;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(232,255,71,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(232,255,71,0.03) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
      z-index: 0;
    }

    nav {
      position: relative;
      z-index: 10;
      display: flex;
      align-items: center;
      padding: 18px 24px;
      border-bottom: 1px solid var(--border);
    }

    .logo {
      font-family: var(--font-display);
      font-size: 20px;
      font-weight: 800;
      text-decoration: none;
      color: var(--text);
      letter-spacing: -.02em;
    }

    .logo span { color: var(--accent); }

    .page {
      position: relative;
      z-index: 1;
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 24px;
    }

    .card {
      width: 100%;
      max-width: 400px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 36px 32px;
      animation: cardIn .3s cubic-bezier(.22,1,.36,1);
    }

    @keyframes cardIn {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .card-title {
      font-family: var(--font-display);
      font-size: 24px;
      font-weight: 800;
      margin-bottom: 6px;
      letter-spacing: -.02em;
    }

    .card-sub {
      font-size: 12px;
      color: var(--muted);
      margin-bottom: 28px;
      line-height: 1.6;
    }

    .field { margin-bottom: 16px; }

    .field label {
      display: block;
      font-size: 11px;
      letter-spacing: .08em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 7px;
    }

    .field input {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      font-family: var(--font-mono);
      font-size: 14px;
      padding: 11px 14px;
      outline: none;
      transition: border-color .15s;
    }

    .field input:focus { border-color: var(--accent); }
    .field input::placeholder { color: var(--muted); }
    .field.error input { border-color: var(--error); }

    .field-msg {
      display: none;
      margin-top: 5px;
      font-size: 11px;
      color: var(--error);
    }

    .field.error .field-msg { display: block; }

    .strength-bar {
      height: 3px;
      border-radius: 2px;
      background: var(--border);
      margin-top: 6px;
      overflow: hidden;
    }

    .strength-fill {
      height: 100%;
      border-radius: 2px;
      width: 0%;
      transition: width .3s, background .3s;
    }

    .submit-btn {
      width: 100%;
      padding: 13px;
      background: var(--accent);
      border: none;
      border-radius: var(--radius);
      color: var(--bg);
      font-family: var(--font-mono);
      font-size: 13px;
      font-weight: 500;
      letter-spacing: .04em;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      transition: opacity .18s, transform .12s;
      margin-top: 8px;
    }

    .submit-btn:hover:not(:disabled) { opacity: .88; transform: translateY(-1px); }
    .submit-btn:disabled { opacity: .5; cursor: not-allowed; }

    .spinner {
      width: 16px;
      height: 16px;
      border: 2px solid rgba(0,0,0,.2);
      border-top-color: var(--bg);
      border-radius: 50%;
      animation: spin .7s linear infinite;
      display: none;
    }

    .loading .spinner { display: block; }
    .loading .btn-text { display: none; }

    @keyframes spin { to { transform: rotate(360deg); } }

    .alert {
      display: none;
      padding: 11px 14px;
      border-radius: var(--radius);
      font-size: 12px;
      line-height: 1.6;
      margin-bottom: 16px;
    }

    .alert.error {
      display: block;
      background: rgba(255,68,68,.08);
      border: 1px solid rgba(255,68,68,.25);
      color: var(--error);
    }

    .alert.success {
      display: block;
      background: rgba(68,255,136,.08);
      border: 1px solid rgba(68,255,136,.25);
      color: var(--success);
    }

    @media (max-width: 480px) {
      .card { padding: 28px 20px; }
    }
  </style>
</head>
<body>

  <nav>
    <a href="/" class="logo">TH<span>AI</span>S</a>
  </nav>

  <div class="page">
    <div class="card">

      <div class="alert" id="alert"></div>

      <!-- Reset form -->
      <div id="reset-form">
        <h1 class="card-title">New password.</h1>
        <p class="card-sub">Choose a strong password for your Thais account.</p>

        <div class="field" id="password-field">
          <label for="password">New password</label>
          <input type="password" id="password" placeholder="••••••••" autocomplete="new-password" oninput="checkStrength(this.value)" />
          <div class="strength-bar">
            <div class="strength-fill" id="strength-fill"></div>
          </div>
          <span class="field-msg">Password must be at least 8 characters</span>
        </div>

        <div class="field" id="confirm-field">
          <label for="confirm">Confirm password</label>
          <input type="password" id="confirm" placeholder="••••••••" autocomplete="new-password" />
          <span class="field-msg">Passwords do not match</span>
        </div>

        <button class="submit-btn" id="reset-btn" onclick="handleReset()">
          <span class="spinner"></span>
          <span class="btn-text">Update password</span>
        </button>
      </div>

      <!-- Success state -->
      <div id="success-state" style="display:none; text-align:center;">
        <h1 class="card-title" style="margin-bottom:12px;">Done.</h1>
        <p class="card-sub">Your password has been updated. Redirecting you to sign in…</p>
      </div>

      <!-- Invalid link state -->
      <div id="invalid-state" style="display:none; text-align:center;">
        <h1 class="card-title" style="margin-bottom:12px;">Link expired.</h1>
        <p class="card-sub" style="margin-bottom:24px;">This password reset link has expired or already been used.</p>
        <a href="/signin" style="color:var(--accent);font-size:13px;">← Back to sign in</a>
      </div>

    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <script>
    const SUPABASE_URL  = 'https://czubtmjnjhikvfotcdug.supabase.co';
    const SUPABASE_ANON = 'sb_publishable_NTMVggZSl6xG4SS3Q0yr5Q_Sx8NVHEW';
    const { createClient } = supabase;
    const sb = createClient(SUPABASE_URL, SUPABASE_ANON);

    // Check for valid reset session on page load
    sb.auth.onAuthStateChange(async (event, session) => {
      if (event === 'PASSWORD_RECOVERY') {
        // Valid reset link — show the form
        document.getElementById('reset-form').style.display = 'block';
        document.getElementById('invalid-state').style.display = 'none';
      }
    });

    // If no token in URL, show invalid state after a moment
    setTimeout(() => {
      const hash = window.location.hash;
      if (!hash.includes('type=recovery') && !hash.includes('access_token')) {
        document.getElementById('reset-form').style.display = 'none';
        document.getElementById('invalid-state').style.display = 'block';
      }
    }, 500);

    function checkStrength(password) {
      const fill = document.getElementById('strength-fill');
      let score = 0;
      if (password.length >= 8)  score++;
      if (password.length >= 12) score++;
      if (/[A-Z]/.test(password)) score++;
      if (/[0-9]/.test(password)) score++;
      if (/[^A-Za-z0-9]/.test(password)) score++;
      const widths = ['0%','20%','40%','60%','80%','100%'];
      const colors = ['#ff4444','#ff4444','#ff8844','#ffcc44','#88ff44','#44ff88'];
      fill.style.width = widths[score];
      fill.style.background = colors[score];
    }

    function showAlert(msg, type = 'error') {
      const el = document.getElementById('alert');
      el.textContent = msg;
      el.className = `alert ${type}`;
    }

    function setLoading(loading) {
      const btn = document.getElementById('reset-btn');
      btn.disabled = loading;
      btn.classList.toggle('loading', loading);
    }

    async function handleReset() {
      const password = document.getElementById('password').value;
      const confirm  = document.getElementById('confirm').value;

      let valid = true;
      if (password.length < 8) {
        document.getElementById('password-field').classList.add('error');
        valid = false;
      } else {
        document.getElementById('password-field').classList.remove('error');
      }
      if (password !== confirm) {
        document.getElementById('confirm-field').classList.add('error');
        valid = false;
      } else {
        document.getElementById('confirm-field').classList.remove('error');
      }
      if (!valid) return;

      setLoading(true);
      try {
        const { error } = await sb.auth.updateUser({ password });
        if (error) throw error;

        // Show success and redirect
        document.getElementById('reset-form').style.display = 'none';
        document.getElementById('success-state').style.display = 'block';
        setTimeout(() => { window.location.href = '/signin'; }, 2500);
      } catch (err) {
        showAlert(err.message || 'Failed to update password. Please try again.');
      } finally {
        setLoading(false);
      }
    }
  </script>

</body>
</html>
